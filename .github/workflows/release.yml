name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../aether-${{ matrix.target }}.tar.gz aether
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-${{ matrix.target }}
          path: aether-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download artifacts and compute SHA256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            curl -fsSL "https://github.com/connectchiragg/aether/releases/download/v${VERSION}/aether-${target}.tar.gz" -o "aether-${target}.tar.gz"
            sha=$(sha256sum "aether-${target}.tar.gz" | cut -d' ' -f1)
            # Export as env var with target name (dashes to underscores)
            varname=$(echo "$target" | tr '-' '_')
            echo "SHA_${varname}=${sha}" >> $GITHUB_ENV
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: connectchiragg/homebrew-tap
          token: ${{ secrets.AETHER_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > homebrew-tap/Formula/aether.rb << FORMULA
          class Aether < Formula
            desc "Live observability for coding agents"
            homepage "https://github.com/connectchiragg/aether"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/connectchiragg/aether/releases/download/v${VERSION}/aether-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/connectchiragg/aether/releases/download/v${VERSION}/aether-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/connectchiragg/aether/releases/download/v${VERSION}/aether-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/connectchiragg/aether/releases/download/v${VERSION}/aether-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "aether"
            end

            def caveats
              <<~EOS
                Enable one or more providers:
                  aether setup claude
                  aether setup codex

                Then:
                  aether watch        # choose a provider and watch sessions

                To clean up after uninstall:
                  curl -fsSL https://raw.githubusercontent.com/connectchiragg/aether/master/uninstall.sh | bash
              EOS
            end

            test do
              assert_match "aether", shell_output("#{bin}/aether --help")
            end
          end
          FORMULA

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' homebrew-tap/Formula/aether.rb

      - name: Push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aether.rb
          git commit -m "Update aether to v${{ steps.version.outputs.version }}"
          git push
